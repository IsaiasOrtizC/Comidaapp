<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Ubicación</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #header {
    padding: 12px 16px;
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
    z-index: 1000;
  }

  #header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  #status-badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
    transition: all 0.3s;
  }

  .status-waiting  { background: #2a2d3e; color: #888; }
  .status-loading  { background: #1e3a5f; color: #4fa3e0; }
  .status-active   { background: #1a3a2a; color: #4ecb8c; }
  .status-error    { background: #3a1a1a; color: #e06060; }

  #map {
    flex: 1;
    width: 100%;
    z-index: 1;
  }

  #info-panel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    gap: 10px;
    pointer-events: none;
  }

  .info-card {
    background: rgba(26, 29, 39, 0.92);
    backdrop-filter: blur(10px);
    border: 1px solid #2a2d3e;
    border-radius: 12px;
    padding: 10px 16px;
    text-align: center;
    min-width: 90px;
  }

  .info-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 2px;
  }

  .info-value {
    font-size: 18px;
    font-weight: 600;
    color: #e8eaf0;
  }

  .info-unit {
    font-size: 11px;
    color: #888;
    margin-left: 2px;
  }

  #compass-card {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #compass-arrow {
    font-size: 28px;
    line-height: 1;
    transition: transform 0.3s ease;
    margin: 2px 0;
  }

  #compass-dir {
    font-size: 12px;
    color: #4fa3e0;
    font-weight: 600;
  }

  #btn-locate {
    position: absolute;
    top: 70px;
    right: 12px;
    z-index: 1000;
    background: #1a1d27;
    border: 1px solid #2a2d3e;
    color: #e8eaf0;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  #btn-locate:hover { background: #2a2d3e; }

  #permission-overlay {
    position: absolute;
    inset: 0;
    z-index: 2000;
    background: rgba(15, 17, 23, 0.96);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    text-align: center;
  }

  #permission-overlay .icon {
    font-size: 52px;
    margin-bottom: 4px;
  }

  #permission-overlay h2 {
    font-size: 20px;
    font-weight: 600;
  }

  #permission-overlay p {
    font-size: 14px;
    color: #888;
    max-width: 280px;
    line-height: 1.6;
  }

  #btn-allow {
    background: #1a5cb3;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }

  #btn-allow:hover { background: #2068c4; }

  .leaflet-control-zoom a {
    background: #1a1d27 !important;
    color: #e8eaf0 !important;
    border-color: #2a2d3e !important;
  }

  .compass-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .no-orient {
    font-size: 11px;
    color: #555;
  }

  #accuracy-bar {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ecb8c;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:8px">
    <span id="accuracy-bar" style="display:none"></span>
    <h1 id="header-title">Mi Ubicación</h1>
  </div>
  <span id="status-badge" class="status-badge status-waiting">Esperando...</span>
</div>

<div id="map"></div>

<div id="info-panel">
  <div class="info-card">
    <div class="info-label">Precisión</div>
    <div class="info-value" id="val-accuracy">—</div>
    <span class="info-unit" id="unit-accuracy"></span>
  </div>
  <div class="info-card" id="compass-card">
    <div class="info-label">Orientación</div>
    <div id="compass-arrow">🧭</div>
    <div id="compass-dir">—</div>
  </div>
  <div class="info-card">
    <div class="info-label">Velocidad</div>
    <div class="info-value" id="val-speed">0</div>
    <span class="info-unit">km/h</span>
  </div>
</div>

<button id="btn-locate" title="Centrar en mi ubicación">📍</button>

<div id="permission-overlay">
  <div class="icon">📍</div>
  <h2>¿Dónde estás?</h2>
  <p>Este mapa necesita acceso a tu ubicación para mostrarte dónde estás y hacia dónde apuntas.</p>
  <button id="btn-allow">Permitir acceso</button>
  <p class="no-orient" id="orient-note" style="display:none">
    ⚠️ Tu navegador no soporta brújula automática.<br>La orientación se estimará por movimiento.
  </p>
</div>

<script>
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true
}).setView([0, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

const statusEl  = document.getElementById('status-badge');
const accuracyEl = document.getElementById('val-accuracy');
const speedEl   = document.getElementById('val-speed');
const compassArrow = document.getElementById('compass-arrow');
const compassDir   = document.getElementById('compass-dir');
const accuracyBar  = document.getElementById('accuracy-bar');
const overlay   = document.getElementById('permission-overlay');
const orientNote = document.getElementById('orient-note');
const btnAllow  = document.getElementById('btn-allow');
const btnLocate = document.getElementById('btn-locate');

let userMarker = null;
let accuracyCircle = null;
let headingArrow = null;
let currentHeading = null;
let currentPos = null;

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = 'status-badge ' + cls;
}

function degToCompass(deg) {
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  return dirs[Math.round(deg / 45) % 8];
}

function updateHeadingMarker() {
  if (!currentPos || currentHeading === null) return;
  const { lat, lng } = currentPos;
  const rad = (currentHeading * Math.PI) / 180;
  const dist = 0.0003;
  const destLat = lat + dist * Math.cos(rad);
  const destLng = lng + dist * Math.sin(rad);

  if (headingArrow) map.removeLayer(headingArrow);

  headingArrow = L.polyline(
    [[lat, lng], [destLat, destLng]],
    { color: '#4fa3e0', weight: 3, opacity: 0.9 }
  ).addTo(map);

  compassArrow.style.transform = `rotate(${currentHeading}deg)`;
  compassArrow.textContent = '⬆️';
  compassDir.textContent = degToCompass(currentHeading) + ' ' + Math.round(currentHeading) + '°';
}

function onPosition(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = pos.coords.accuracy;
  const spd = pos.coords.speed;
  const hdg = pos.coords.heading;

  currentPos = { lat, lng };

  accuracyEl.textContent = Math.round(acc);
  document.getElementById('unit-accuracy').textContent = 'm';
  speedEl.textContent = spd ? Math.round(spd * 3.6) : '0';

  if (hdg !== null && !isNaN(hdg)) {
    currentHeading = hdg;
    updateHeadingMarker();
  }

  if (!userMarker) {
    map.setView([lat, lng], 17);
    setStatus('Ubicado ✓', 'status-active');
    accuracyBar.style.display = 'inline-block';

    userMarker = L.circleMarker([lat, lng], {
      radius: 10,
      fillColor: '#4fa3e0',
      color: '#fff',
      weight: 3,
      fillOpacity: 1
    }).addTo(map).bindPopup('Estás aquí');

    accuracyCircle = L.circle([lat, lng], {
      radius: acc,
      color: '#4fa3e0',
      fillColor: '#4fa3e0',
      fillOpacity: 0.1,
      weight: 1
    }).addTo(map);
  } else {
    userMarker.setLatLng([lat, lng]);
    accuracyCircle.setLatLng([lat, lng]).setRadius(acc);
  }
}

function onError(err) {
  let msg = 'Sin acceso';
  if (err.code === 1) msg = 'Permiso denegado';
  else if (err.code === 2) msg = 'Sin señal GPS';
  setStatus(msg, 'status-error');
  accuracyEl.textContent = '—';
}

function startTracking() {
  overlay.style.display = 'none';
  setStatus('Buscando GPS...', 'status-loading');

  if (!navigator.geolocation) {
    setStatus('No soportado', 'status-error');
    return;
  }

  navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 10000
  });

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') listenOrientation();
      }).catch(() => {});
  } else if (window.DeviceOrientationEvent) {
    listenOrientation();
  } else {
    orientNote.style.display = 'block';
  }
}

function listenOrientation() {
  window.addEventListener('deviceorientationabsolute', onOrient, true);
  window.addEventListener('deviceorientation', onOrient, true);
}

function onOrient(e) {
  let heading = null;
  if (e.webkitCompassHeading !== undefined) {
    heading = e.webkitCompassHeading;
  } else if (e.absolute && e.alpha !== null) {
    heading = (360 - e.alpha) % 360;
  } else if (e.alpha !== null) {
    heading = (360 - e.alpha) % 360;
  }
  if (heading !== null) {
    currentHeading = heading;
    updateHeadingMarker();
  }
}

btnAllow.addEventListener('click', startTracking);
btnLocate.addEventListener('click', () => {
  if (currentPos) map.setView([currentPos.lat, currentPos.lng], 17);
});
</script>
</body>
</html>
